<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ibrahim's Internship Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --border2: #363a45;
    --green: #22c55e;
    --green-dim: #166534;
    --green-glow: rgba(34,197,94,0.12);
    --text: #f0f2f5;
    --text2: #8b9099;
    --text3: #555b66;
    --red: #ef4444;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

  /* layout */
  .app { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* header */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; }
  .header-left h1 { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--green); letter-spacing: -0.02em; }
  .header-left p { font-size: 12px; color: var(--text3); margin-top: 3px; font-family: var(--mono); }
  .stats-row { display: flex; gap: 1.5rem; }
  .stat { text-align: right; }
  .stat-num { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 1.5rem; background: var(--surface); border-radius: var(--radius); padding: 3px; border: 1px solid var(--border); }
  .tab { flex: 1; padding: 7px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text2); transition: all 0.15s; text-align: center; }
  .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* URL input area */
  .url-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
  .url-area label { display: block; font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
  .url-row { display: flex; gap: 8px; }
  .url-input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: var(--mono); color: var(--text); outline: none; transition: border-color 0.15s; }
  .url-input:focus { border-color: var(--green); }
  .url-input::placeholder { color: var(--text3); }
  .btn-primary { background: var(--green); color: #000; border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; font-family: var(--sans); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: var(--sans); }
  .btn-ghost:hover { border-color: var(--border); color: var(--text); background: var(--surface2); }
  .status-line { font-size: 12px; font-family: var(--mono); color: var(--text3); margin-top: 8px; min-height: 16px; }
  .status-line.ok { color: var(--green); }
  .status-line.err { color: var(--red); }

  /* quiz */
  .quiz-wrap { display: none; }
  .progress-track { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; }
  .progress-fill { height: 2px; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .q-meta { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .q-text { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
  .choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .choice { background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.12s; font-family: var(--sans); }
  .choice:hover { border-color: var(--green); color: var(--text); }
  .choice.sel { background: var(--green-glow); border-color: var(--green); color: var(--green); font-weight: 500; }
  .choice.dim { opacity: 0.35; }
  .text-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: var(--mono); color: var(--text); outline: none; transition: border-color 0.15s; }
  .text-input:focus { border-color: var(--green); }
  .text-input::placeholder { color: var(--text3); }
  .other-wrap { margin-top: 8px; display: none; }
  .quiz-actions { display: flex; gap: 8px; margin-top: 1.25rem; }

  /* log table */
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; margin-top: 2rem; }
  .log-header h2 { font-family: var(--mono); font-size: 13px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .export-btns { display: flex; gap: 6px; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface); padding: 9px 12px; text-align: left; font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text2); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface); }
  .td-company { font-weight: 600; color: var(--text); font-size: 13px; }
  .td-role { color: var(--text); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; font-family: var(--mono); }
  .b-wish { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }
  .b-applied { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
  .b-oa { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  .b-phone { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .b-interview { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
  .b-offer { background: rgba(34,197,94,0.25); color: #4ade80; border: 1px solid rgba(34,197,94,0.4); }
  .b-rejected { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .b-withdrawn { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.25); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 2px 4px; border-radius: 4px; transition: color 0.12s; }
  .del-btn:hover { color: var(--red); }

  /* empty state */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-family: var(--mono); font-size: 13px; }
  .empty span { display: block; font-size: 28px; margin-bottom: 0.75rem; }

  /* toast */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface2); border: 1px solid var(--green); color: var(--green); font-family: var(--mono); font-size: 12px; padding: 10px 16px; border-radius: var(--radius-sm); opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* dashboard tab */
  .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .dash-num { font-family: var(--mono); font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
  .dash-label { font-size: 11px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .dash-num.green { color: var(--green); }
  .dash-num.amber { color: var(--amber); }
  .dash-num.red { color: var(--red); }
  .status-breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .sb-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid var(--border); }
  .sb-row:last-child { border-bottom: none; }
  .sb-label { font-size: 13px; color: var(--text2); }
  .sb-bar-wrap { flex: 1; margin: 0 12px; height: 4px; background: var(--border); border-radius: 2px; }
  .sb-bar { height: 4px; border-radius: 2px; background: var(--green); transition: width 0.4s; }
  .sb-count { font-family: var(--mono); font-size: 13px; color: var(--text); min-width: 20px; text-align: right; }

  @media (max-width: 600px) {
    .dash-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-row { gap: 1rem; }
    .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .stats-row { align-self: stretch; justify-content: space-between; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>// internship.tracker</h1>
      <p id="headerSub">ibrahim's application log — 2025</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="hTotal">0</div><div class="stat-label">total</div></div>
      <div class="stat"><div class="stat-num" id="hActive" style="color:var(--amber)">0</div><div class="stat-label">active</div></div>
      <div class="stat"><div class="stat-num" id="hOffers" style="color:var(--green)">0</div><div class="stat-label">offers</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">+ Add application</button>
    <button class="tab" onclick="switchTab('log')">Log</button>
    <button class="tab" onclick="switchTab('dash')">Dashboard</button>
  </div>

  <!-- ADD TAB -->
  <div class="tab-panel active" id="tab-add">
    <div class="url-area">
      <label>Job posting URL</label>
      <div class="url-row">
        <input class="url-input" type="text" id="urlInput" placeholder="https://jobs.company.com/intern-swe-2025"/>
        <button class="btn-primary" id="analyzeBtn" onclick="fetchAndQuiz()">Analyze ↗</button>
      </div>
      <div class="status-line" id="statusLine"></div>
    </div>

    <div class="quiz-wrap" id="quizWrap">
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div id="qContainer"></div>
      <div class="quiz-actions">
        <button class="btn-primary" onclick="addToLog()">Save to log</button>
        <button class="btn-ghost" onclick="resetQuiz()">Clear</button>
      </div>
    </div>
  </div>

  <!-- LOG TAB -->
  <div class="tab-panel" id="tab-log">
    <div class="log-header">
      <h2 id="logTitle">Applications (0)</h2>
      <div class="export-btns">
        <button class="btn-ghost" onclick="exportCSV()">CSV</button>
        <button class="btn-ghost" onclick="exportXLSX()">XLSX</button>
        <button class="btn-ghost" onclick="copyForExcel()">Copy rows</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Company</th><th>Role</th><th>Location</th><th>Type</th>
          <th>Status</th><th>Priority</th><th>Date</th><th>Notes</th><th></th>
        </tr></thead>
        <tbody id="logBody"><tr><td colspan="9"><div class="empty"><span>📋</span>No applications yet.<br/>Add one from the first tab.</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- DASH TAB -->
  <div class="tab-panel" id="tab-dash">
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-num" id="dTotal">0</div><div class="dash-label">Total applied</div></div>
      <div class="dash-card"><div class="dash-num amber" id="dActive">0</div><div class="dash-label">In progress</div></div>
      <div class="dash-card"><div class="dash-num green" id="dOffers">0</div><div class="dash-label">Offers</div></div>
      <div class="dash-card"><div class="dash-num red" id="dRejected">0</div><div class="dash-label">Rejected</div></div>
    </div>
    <div class="status-breakdown" id="sbBreakdown"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const QUESTIONS = [
  { id:"company",  label:"Company",        q:"What company is this?",                      type:"text" },
  { id:"role",     label:"Role",           q:"What's the job title?",                       type:"text" },
  { id:"location", label:"Location",       q:"Where is this role?",
    choices:["Remote","Hybrid","Bay Area, CA","Seattle, WA","New York, NY","Austin, TX","Los Angeles, CA","Other"] },
  { id:"type",     label:"Role type",      q:"What category fits best?",
    choices:["SWE","ML / AI","Data","PM","Design","Research","Fintech","Other"] },
  { id:"status",   label:"Status",         q:"Current status on this one?",
    choices:["Wishlist","Applied","OA Received","Phone Screen","Interviewing","Offer","Rejected","Withdrawn"] },
  { id:"priority", label:"Priority",       q:"How excited are you about this role?",
    choices:["High","Medium","Low"] },
  { id:"salary",   label:"Salary",         q:"Any pay info in the posting?",
    choices:["Not listed","< $25/hr","$25–35/hr","$35–50/hr","> $50/hr","$5–7k/mo","$7–10k/mo","> $10k/mo"] },
  { id:"notes",    label:"Notes",          q:"Quick notes? (optional)",                     type:"notes" },
];

const STATUS_CLASSES = {
  "Wishlist":"b-wish","Applied":"b-applied","OA Received":"b-oa",
  "Phone Screen":"b-phone","Interviewing":"b-interview","Offer":"b-offer",
  "Rejected":"b-rejected","Withdrawn":"b-withdrawn"
};

let answers = {}, prefilled = {};
let rows = JSON.parse(localStorage.getItem("iat_rows") || "[]");

function save() { localStorage.setItem("iat_rows", JSON.stringify(rows)); }

function switchTab(id) {
  document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", ["add","log","dash"][i]===id));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-"+id).classList.add("active");
  if (id === "dash") renderDash();
  if (id === "log") renderLog();
  updateHeader();
}

async function fetchAndQuiz() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) { setStatus("Paste a URL first.", "err"); return; }
  const btn = document.getElementById("analyzeBtn");
  btn.disabled = true; btn.textContent = "Analyzing…";
  setStatus("Fetching posting details…", "");

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:600,
        system:`Extract job posting details from the URL provided. Return ONLY valid JSON with keys: company, role, location, type, salary, notes.
- location: city/state or "Remote" or "Hybrid"
- type: SWE / ML / AI / Data / PM / Design / Research / Fintech / Other
- salary: text from posting or "Not listed"
- notes: one concise sentence, or ""
If URL is inaccessible, infer from URL string. No markdown, just JSON.`,
        messages:[{role:"user",content:`URL: ${url}`}]
      })
    });
    const data = await res.json();
    const raw = data.content?.find(b=>b.type==="text")?.text || "{}";
    try { prefilled = JSON.parse(raw.replace(/```json|```/g,"").trim()); }
    catch(e) { prefilled = {}; }
    setStatus("Details extracted — confirm below.", "ok");
  } catch(e) {
    setStatus("Couldn't fetch — fill in manually.", "err");
    prefilled = {};
  }

  btn.disabled = false; btn.textContent = "Analyze ↗";
  buildQuiz();
}

function buildQuiz() {
  answers = {};
  const c = document.getElementById("qContainer");
  c.innerHTML = "";
  QUESTIONS.forEach((q, qi) => {
    const div = document.createElement("div");
    div.className = "q-card";
    let html = `<div class="q-meta">${q.label} &nbsp;·&nbsp; ${qi+1}/${QUESTIONS.length}</div>`;
    html += `<div class="q-text">${q.q}</div>`;
    if (q.type === "text") {
      const v = prefilled[q.id] || "";
      if (v) answers[q.id] = v;
      html += `<input class="text-input" id="ti-${q.id}" value="${v}" placeholder="Type here…"
        oninput="answers['${q.id}']=this.value;updateProg();" />`;
    } else if (q.type === "notes") {
      const v = prefilled.notes || "";
      html += `<textarea class="text-input" id="ti-${q.id}" rows="2" placeholder="Optional…"
        oninput="answers['${q.id}']=this.value;" style="resize:vertical;">${v}</textarea>`;
    } else {
      let choices = [...q.choices];
      const pre = prefilled[q.id];
      if (pre && !choices.find(c=>c.toLowerCase()===pre.toLowerCase())) choices.push(pre);
      html += `<div class="choices" id="ch-${q.id}">`;
      choices.forEach(ch => {
        const isSel = pre && ch.toLowerCase()===pre.toLowerCase();
        if (isSel) answers[q.id] = ch;
        html += `<button class="choice${isSel?" sel":""}" onclick="pick('${q.id}',this,'${ch.replace(/'/g,"&#39;")}')">${ch}</button>`;
      });
      html += `<button class="choice" onclick="toggleOther('${q.id}',this)">Other…</button></div>`;
      html += `<div class="other-wrap" id="ow-${q.id}"><input class="text-input" placeholder="Type custom value…"
        oninput="answers['${q.id}']=this.value;updateProg();" /></div>`;
    }
    div.innerHTML = html;
    c.appendChild(div);
  });
  document.getElementById("quizWrap").style.display = "block";
  updateProg();
}

function pick(id, btn, val) {
  answers[id] = val;
  document.querySelectorAll(`#ch-${id} .choice`).forEach(b=>{b.classList.remove("sel","dim");b.classList.add("dim");});
  btn.classList.remove("dim"); btn.classList.add("sel");
  document.getElementById(`ow-${id}`).style.display = "none";
  updateProg();
}

function toggleOther(id, btn) {
  const ow = document.getElementById(`ow-${id}`);
  const open = ow.style.display === "block";
  document.querySelectorAll(`#ch-${id} .choice`).forEach(b=>b.classList.remove("sel","dim"));
  if (!open) { ow.style.display="block"; btn.classList.add("sel"); delete answers[id]; }
  else { ow.style.display="none"; }
  updateProg();
}

function updateProg() {
  let filled = 0;
  QUESTIONS.forEach(q => {
    if (q.type==="notes") { filled++; return; }
    const ti = document.getElementById(`ti-${q.id}`);
    if (ti && ti.value.trim()) { filled++; return; }
    if (answers[q.id]) filled++;
  });
  const pct = Math.round(filled / (QUESTIONS.length-1) * 100);
  document.getElementById("progFill").style.width = Math.min(pct,100)+"%";
}

function getVal(id) {
  const ti = document.getElementById(`ti-${id}`);
  if (ti) return ti.value.trim();
  return answers[id] || "";
}

function addToLog() {
  const company = getVal("company");
  if (!company) { setStatus("At least fill in the company name.", "err"); return; }
  const row = {
    id: Date.now(),
    company, role: getVal("role") || "—",
    location: getVal("location") || "—",
    type: getVal("type") || "—",
    status: getVal("status") || "Wishlist",
    priority: getVal("priority") || "Medium",
    salary: getVal("salary") || "Not listed",
    notes: getVal("notes") || "",
    date: new Date().toISOString().split("T")[0],
    url: document.getElementById("urlInput").value.trim(),
  };
  rows.unshift(row);
  save();
  toast(`Saved: ${row.company}`);
  setStatus("", "");
  resetQuiz();
  updateHeader();
}

function deleteRow(id) {
  rows = rows.filter(r => r.id !== id);
  save(); renderLog(); updateHeader();
}

function resetQuiz() {
  document.getElementById("urlInput").value = "";
  document.getElementById("quizWrap").style.display = "none";
  document.getElementById("qContainer").innerHTML = "";
  answers = {}; prefilled = {};
  setStatus("","");
}

function setStatus(msg, type) {
  const el = document.getElementById("statusLine");
  el.textContent = msg;
  el.className = "status-line" + (type ? " "+type : "");
}

function renderLog() {
  const tbody = document.getElementById("logBody");
  document.getElementById("logTitle").textContent = `Applications (${rows.length})`;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty"><span>📋</span>No applications yet.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="td-company">${r.company}</td>
      <td class="td-role">${r.role}</td>
      <td>${r.location}</td>
      <td>${r.type}</td>
      <td><span class="badge ${STATUS_CLASSES[r.status]||"b-wish"}">${r.status}</span></td>
      <td style="color:${r.priority==='High'?'var(--red)':r.priority==='Medium'?'var(--amber)':'var(--text3)'};font-size:12px;">${r.priority}</td>
      <td style="font-family:var(--mono);font-size:12px;">${r.date}</td>
      <td style="font-size:12px;max-width:160px;">${r.notes}</td>
      <td><button class="del-btn" onclick="deleteRow(${r.id})" title="Remove">×</button></td>
    </tr>`).join("");
}

function renderDash() {
  const total = rows.filter(r=>!["Wishlist"].includes(r.status)).length;
  const active = rows.filter(r=>["OA Received","Phone Screen","Interviewing"].includes(r.status)).length;
  const offers = rows.filter(r=>r.status==="Offer").length;
  const rejected = rows.filter(r=>r.status==="Rejected").length;
  document.getElementById("dTotal").textContent = total;
  document.getElementById("dActive").textContent = active;
  document.getElementById("dOffers").textContent = offers;
  document.getElementById("dRejected").textContent = rejected;

  const statuses = ["Wishlist","Applied","OA Received","Phone Screen","Interviewing","Offer","Rejected","Withdrawn"];
  const max = Math.max(...statuses.map(s=>rows.filter(r=>r.status===s).length), 1);
  document.getElementById("sbBreakdown").innerHTML = statuses.map(s => {
    const cnt = rows.filter(r=>r.status===s).length;
    const pct = Math.round(cnt/max*100);
    return `<div class="sb-row">
      <span class="sb-label"><span class="badge ${STATUS_CLASSES[s]||"b-wish"}" style="margin-right:8px;">${s}</span></span>
      <div class="sb-bar-wrap"><div class="sb-bar" style="width:${pct}%"></div></div>
      <span class="sb-count">${cnt}</span>
    </div>`;
  }).join("");
}

function updateHeader() {
  const total = rows.length;
  const active = rows.filter(r=>["OA Received","Phone Screen","Interviewing"].includes(r.status)).length;
  const offers = rows.filter(r=>r.status==="Offer").length;
  document.getElementById("hTotal").textContent = total;
  document.getElementById("hActive").textContent = active;
  document.getElementById("hOffers").textContent = offers;
  document.getElementById("logTitle").textContent = `Applications (${total})`;
}

function getExportData() {
  return [
    ["Company","Role / Position","Location","Type","Source / Link","Date Applied","Status","Priority","Salary Est.","Notes"],
    ...rows.map(r=>[r.company,r.role,r.location,r.type,r.url,r.date,r.status,r.priority,r.salary,r.notes])
  ];
}

function exportCSV() {
  const csv = getExportData().map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  dl(new Blob([csv],{type:"text/csv"}), "internship_log.csv");
}

function exportXLSX() {
  const ws = XLSX.utils.aoa_to_sheet(getExportData());
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Applications");
  XLSX.writeFile(wb, "internship_log.xlsx");
}

function copyForExcel() {
  const text = rows.map(r=>[r.company,r.role,r.location,r.type,r.url,r.date,r.status,r.priority,r.salary,r.notes].join("\t")).join("\n");
  navigator.clipboard.writeText(text).then(()=>toast("Copied! Paste into your tracker spreadsheet."));
}

function dl(blob, name) {
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; a.click();
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2800);
}

updateHeader();
</script>
</body>
</html>
