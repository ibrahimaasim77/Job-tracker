<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ibrahim's Internship Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>// internship.tracker</h1>
      <p id="headerSub">ibrahim's application log — 2025</p>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="hTotal">0</div><div class="stat-label">total</div></div>
      <div class="stat"><div class="stat-num" id="hActive" style="color:var(--amber)">0</div><div class="stat-label">active</div></div>
      <div class="stat"><div class="stat-num" id="hOffers" style="color:var(--green)">0</div><div class="stat-label">offers</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">+ Add application</button>
    <button class="tab" onclick="switchTab('log')">Log</button>
    <button class="tab" onclick="switchTab('dash')">Dashboard</button>
  </div>

  <!-- ADD TAB -->
  <div class="tab-panel active" id="tab-add">
    <div class="url-area">
      <label>Job posting URL</label>
      <div class="url-row">
        <input class="url-input" type="text" id="urlInput" placeholder="https://jobs.company.com/intern-swe-2025"/>
        <button class="btn-primary" id="analyzeBtn" onclick="fetchAndQuiz()">Analyze ↗</button>
      </div>
      <div class="status-line" id="statusLine"></div>
    </div>
    <div class="quiz-wrap" id="quizWrap">
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      <div id="qContainer"></div>
      <div class="quiz-actions">
        <button class="btn-primary" onclick="addToLog()">Save to log</button>
        <button class="btn-ghost" onclick="resetQuiz()">Clear</button>
      </div>
    </div>
  </div>

  <!-- LOG TAB -->
  <div class="tab-panel" id="tab-log">
    <div class="log-header">
      <h2 id="logTitle">Applications (0)</h2>
      <div class="export-btns">
        <button class="btn-ghost" onclick="exportCSV()">CSV</button>
        <button class="btn-ghost" onclick="exportXLSX()">XLSX</button>
        <button class="btn-ghost" onclick="copyForExcel()">Copy rows</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Company</th><th>Role</th><th>Location</th><th>Type</th>
          <th>Status</th><th>Priority</th><th>Date</th><th>Notes</th><th></th>
        </tr></thead>
        <tbody id="logBody">
          <tr><td colspan="9"><div class="empty"><span>📋</span>No applications yet.<br/>Add one from the first tab.</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- DASH TAB -->
  <div class="tab-panel" id="tab-dash">
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-num" id="dTotal">0</div><div class="dash-label">Total applied</div></div>
      <div class="dash-card"><div class="dash-num amber" id="dActive">0</div><div class="dash-label">In progress</div></div>
      <div class="dash-card"><div class="dash-num green" id="dOffers">0</div><div class="dash-label">Offers</div></div>
      <div class="dash-card"><div class="dash-num red" id="dRejected">0</div><div class="dash-label">Rejected</div></div>
    </div>
    <div class="status-breakdown" id="sbBreakdown"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="app.js"></script>

</body>
</html>
